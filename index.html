<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coupon Seva Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <!-- LOGIN SCREEN -->
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-card">
        <h1>Coupon Seva Tracker</h1>
        <p>Login as admin or as a devotee to continue.</p>

        <label>
          Login Type
          <select id="loginRole">
            <option value="admin">Admin</option>
            <option value="devotee">Devotee</option>
          </select>
        </label>

        <label id="loginDevoteeLabel" class="hidden">
          Devotee
          <select id="loginDevotee"></select>
        </label>

        <label>
          Password / PIN
          <input id="loginPassword" type="password" required placeholder="Enter password">
        </label>

        <button type="submit">Login</button>
        <p class="hint">First admin password: admin123</p>
      </form>
    </section>

    <!-- HEADER -->
    <header class="topbar">
      <div>
        <h1>Coupon Seva Tracker</h1>
        <p id="couponSubtitle"></p>
      </div>

      <div class="toolbar">
        <!-- 🔥 IMPORTANT: Sync status -->
        <span id="syncBadge" class="user-badge">Local</span>

        <span id="userBadge" class="user-badge"></span>

        <button id="csvBtn" class="ghost" type="button">CSV</button>
        <button id="exportBtn" class="ghost" type="button">Export</button>

        <label class="ghost file-label">
          Import
          <input id="importFile" type="file" accept="application/json,.json">
        </label>

        <button id="logoutBtn" class="ghost" type="button">Logout</button>
      </div>
    </header>

    <!-- MAIN -->
    <main>
      <section class="stats-grid">
        <article><span>Total Coupons</span><strong id="totalCoupons">0</strong></article>
        <article><span>Assigned</span><strong id="assignedCoupons">0</strong></article>
        <article><span>Sold</span><strong id="soldCoupons">0</strong></article>
        <article><span>Money Received</span><strong id="moneyReceived">INR 0</strong></article>
        <article><span>Settled</span><strong id="settledCoupons">0</strong></article>
      </section>

      <nav class="tabs">
        <button class="tab active" data-view="adminView">Admin</button>
        <button class="tab" data-view="devoteeView">Devotee Entry</button>
        <button class="tab" data-view="allCouponsView">All Coupons</button>
      </nav>

      <section id="adminView" class="view active">
        <!-- Your existing admin UI stays same -->
        <div class="panel">
          <h2>Admin Panel</h2>
          <p>All your existing admin UI remains unchanged</p>
        </div>
      </section>

      <section id="devoteeView" class="view">
        <div class="panel">
          <h2>Devotee Entry</h2>
          <select id="entryDevotee"></select>
          <div id="entryList"></div>
        </div>
      </section>

      <section id="allCouponsView" class="view">
        <div class="panel">
          <h2>All Coupons</h2>
          <table>
            <tbody id="allCouponsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <!-- ✅ FIREBASE (VERY IMPORTANT) -->
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-database-compat.js"></script>

    <!-- ✅ YOUR CONFIG -->
    <script src="firebase-config.js"></script>

    <!-- ✅ YOUR APP -->
    <script src="app.js"></script>
  </body>
</html>
